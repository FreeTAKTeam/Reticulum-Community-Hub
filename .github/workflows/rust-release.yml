name: Rust release packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v3.0.0-preview.*"
      - "v3.*"

permissions:
  contents: write

jobs:
  server-package:
    name: Server package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: rch-rust-server-windows-x64
            server_binary: r3akt-rch-server.exe
          - os: ubuntu-latest
            artifact: rch-rust-server-linux-x64
            server_binary: r3akt-rch-server

    steps:
      - name: Check out RCH
        uses: actions/checkout@v6
        with:
          path: rch

      - name: Check out LXMF-rs
        uses: actions/checkout@v6
        with:
          repository: FreeTAKTeam/LXMF-rs
          path: LXMF-rs

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Build server
        working-directory: rch
        run: cargo build --release -p r3akt-rch-server

      - name: Package server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: rch
        run: |
          $pkg = "dist/${{ matrix.artifact }}"
          New-Item -ItemType Directory -Force -Path "$pkg/bin", "$pkg/packaging/server", "$pkg/packaging/windows" | Out-Null
          Copy-Item "target/release/${{ matrix.server_binary }}" "$pkg/bin/"
          Copy-Item "packaging/README.md" "$pkg/packaging/"
          Copy-Item -Recurse "packaging/server/*" "$pkg/packaging/server/"
          Copy-Item "packaging/windows/install-rch-server.ps1" "$pkg/packaging/windows/"
          Copy-Item "packaging/windows/start-rch-server.ps1" "$pkg/packaging/windows/"
          Compress-Archive -Path "$pkg/*" -DestinationPath "dist/${{ matrix.artifact }}.zip" -Force
          Get-FileHash "dist/${{ matrix.artifact }}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash)  ${{ matrix.artifact }}.zip" } | Set-Content "dist/${{ matrix.artifact }}.zip.sha256"

      - name: Package server on Linux
        if: runner.os == 'Linux'
        working-directory: rch
        run: |
          pkg="dist/${{ matrix.artifact }}"
          mkdir -p "$pkg/bin" "$pkg/packaging/server" "$pkg/packaging/windows"
          cp "target/release/${{ matrix.server_binary }}" "$pkg/bin/"
          cp packaging/README.md "$pkg/packaging/"
          cp -R packaging/server/. "$pkg/packaging/server/"
          cp packaging/windows/install-rch-server.ps1 "$pkg/packaging/windows/"
          cp packaging/windows/start-rch-server.ps1 "$pkg/packaging/windows/"
          tar -C "$pkg" -czf "dist/${{ matrix.artifact }}.tar.gz" .
          sha256sum "dist/${{ matrix.artifact }}.tar.gz" > "dist/${{ matrix.artifact }}.tar.gz.sha256"

      - name: Upload server package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            rch/dist/${{ matrix.artifact }}.*
