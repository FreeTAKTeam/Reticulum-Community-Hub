name: Rust workspace

on:
  push:
    branches: ["rust-next", "main"]
  pull_request:
    branches: ["rust-next", "main"]

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out RCH
        uses: actions/checkout@v6
        with:
          path: rch

      - name: Check out LXMF-rs
        uses: actions/checkout@v6
        with:
          repository: FreeTAKTeam/LXMF-rs
          path: LXMF-rs
          ref: e3d5b6f2c8f0e30b5e74396fb7a50b947e090bcd

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Run release readiness gates
        shell: pwsh
        working-directory: rch
        run: ./scripts/release-readiness.ps1 -ServerOnlyAlpha
