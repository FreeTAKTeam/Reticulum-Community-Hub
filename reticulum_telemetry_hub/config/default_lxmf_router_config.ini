# Default LXMF router configuration for Reticulum Community Hub (RCH).
# This file is bootstrapped to <storage_dir>/lxmf-router.ini when absent.
# The hub merges this file with config.ini; inline [propagation]/[lxmf] values in
# config.ini override matching keys here.

[propagation]
enable_node = yes
announce_interval = 10
announce_at_start = yes
autopeer = yes
autopeer_maxdepth = 6
# node_name =
# prioritise_destinations =
# control_allowed =
message_storage_limit = 5
propagation_transfer_max_accepted_size = 256
# propagation_message_max_accepted_size = 256
propagation_sync_max_accepted_size = 10240
propagation_sync_interval_minutes = 10
# propagation_stamp_cost_target =
# propagation_stamp_cost_flexibility =
# peering_cost =
# remote_peering_cost_max =
# max_peers =
# static_peers =
from_static_only = no
# When enabled, place allowed identity hashes one per line in an `allowed`
# file beside this config file.
auth_required = no
startup_mode = background
startup_prune_enabled = no
startup_max_messages =
startup_max_age_days =

[lxmf]
# Leave blank to inherit the hub display name for the internal delivery identity.
display_name =
announce_at_start = yes
announce_interval = 10
delivery_transfer_max_accepted_size = 1000
# on_inbound =
# To ignore specific delivery destinations, place destination hashes one per line
# in an `ignored` file beside this config file.
